spring:
  application:
    name: ai-code
  datasource:
    url: jdbc:mysql://192.168.31.8:13306/ai-code
    username: root
    password: pass@word1
server:
  port: 8123
  # 上下文路径
  servlet:
      context-path: /api
# springdoc-openapi项目配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.damon.aicode.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
# 日志级别
logging:
  level:
    org.springframework: DEBUG
